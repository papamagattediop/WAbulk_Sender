services:
  - type: web
    name: wabulk-backend
    runtime: node
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y chromium && npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
